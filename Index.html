<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WURLI Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f7f0de",
                        "surface-bright": "#fff9eb",
                        "on-secondary-fixed": "#271900",
                        "on-tertiary-container": "#fff3ec",
                        "on-tertiary-fixed-variant": "#683d0f",
                        "on-surface": "#1e1c10",
                        "on-surface-variant": "#42493f",
                        "inverse-surface": "#333024",
                        "error-container": "#ffdad6",
                        "primary-container": "#4a7c44",
                        "inverse-primary": "#9ed493",
                        "primary-fixed-dim": "#9ed493",
                        "surface-container-low": "#faf3e0",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#f8bd45",
                        "on-error": "#ffffff",
                        "surface-variant": "#e9e2d0",
                        "surface-container-highest": "#e9e2d0",
                        "surface-dim": "#e0dac7",
                        "on-primary-fixed-variant": "#20511e",
                        "on-secondary-container": "#715000",
                        "secondary-fixed": "#ffdea7",
                        "background": "#fff9eb",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdcc1",
                        "on-primary-container": "#deffd3",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#f9ba82",
                        "outline-variant": "#c1c9bb",
                        "surface-tint": "#386934",
                        "primary": "#32632e",
                        "on-tertiary-fixed": "#2e1500",
                        "surface": "#fff9eb",
                        "on-secondary-fixed-variant": "#5e4200",
                        "outline": "#72796e",
                        "surface-container-high": "#efe8d5",
                        "tertiary": "#7c4d1f",
                        "error": "#ba1a1a",
                        "tertiary-container": "#986535",
                        "on-primary-fixed": "#002202",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#b9f1ad",
                        "on-background": "#1e1c10",
                        "surface-container": "#f4eedb",
                        "secondary": "#7c5800",
                        "secondary-container": "#fec24a",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "unit": "8px",
                        "sm": "12px",
                        "edge-margin": "32px",
                        "md": "24px",
                        "lg": "40px",
                        "xl": "64px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-bold": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "800"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "500"}],
                        "label-bold": ["14px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .textured-bg {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 222, 167, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(158, 212, 147, 0.15) 0%, transparent 50%);
        }
        .block-shadow {
            box-shadow: 0 8px 0 0 #3E2723;
        }
        .inner-block-shadow {
            box-shadow: inset 0 4px 4px 0 rgba(62, 39, 35, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-edge-margin overflow-hidden select-none">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 z-0 textured-bg opacity-50 pointer-events-none"></div>
<!-- Top Left Decor: Hanging Sign Style -->
<div class="fixed top-0 left-12 flex flex-col items-center space-y-0 z-10">
<div class="w-1 h-12 bg-tertiary"></div>
<div class="bg-surface-container-high border-4 border-tertiary p-4 rounded-xl block-shadow transform -rotate-3">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="potted_plant">potted_plant</span>
</div>
</div>
<!-- Main Splash Canvas -->
<main class="relative z-20 flex flex-col items-center justify-center space-y-xl max-w-4xl w-full">
<!-- Logo Section -->
<div class="flex flex-col items-center space-y-md">
<!-- Brand Mark: The Tractor Icon from JSON 'agriculture' -->
<div class="relative group">
<div class="bg-secondary-container border-4 border-tertiary p-8 rounded-full block-shadow transform transition-transform group-active:translate-y-1 group-active:shadow-none">
<span class="material-symbols-outlined text-on-secondary-container text-6xl" data-icon="agriculture" style="font-variation-settings: 'FILL' 1;">agriculture</span>
</div>
<!-- Decorative Vine Path -->
<div class="absolute -bottom-4 -right-4 bg-primary-container text-on-primary-container p-3 rounded-full border-2 border-tertiary block-shadow rotate-12">
<span class="material-symbols-outlined text-2xl" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
</div>
<!-- Developer Identity -->
<div class="text-center space-y-xs pt-md">
<p class="font-label-bold text-label-bold text-tertiary uppercase tracking-[0.2em] mb-2">Developed by</p>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-widest uppercase drop-shadow-sm">
                    WURLI
                </h1>
</div>
</div>
<!-- Premium Modal/Panel for Progress -->
<div class="w-full max-w-md bg-surface-container border-4 border-tertiary p-sm rounded-2xl block-shadow relative overflow-hidden">
<!-- Hand-drawn style notches -->
<div class="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-tertiary opacity-30"></div>
<div class="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-tertiary opacity-30"></div>
<div class="flex flex-col space-y-sm p-md">
<div class="flex justify-between items-end">
<span class="font-label-bold text-label-bold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="settings_slow_motion">settings_slow_motion</span>
                        Tending the fields...
                    </span>
<span class="font-label-bold text-label-bold text-primary">85%</span>
</div>
<!-- Loading Bar: Organic Seed/Liquid Fill -->
<div class="h-6 w-full bg-surface-variant rounded-full border-2 border-tertiary inner-block-shadow overflow-hidden p-1">
<div class="h-full w-[85%] bg-primary rounded-full relative">
<!-- Texture on the progress bar -->
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 8px 8px;"></div>
</div>
</div>
</div>
</div>
<!-- Sub-label / Tag -->
<div class="flex gap-4">
<div class="bg-surface-variant border-2 border-tertiary px-4 py-2 rounded-lg flex items-center gap-2 transform rotate-1">
<span class="material-symbols-outlined text-secondary" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">PREMIUM RURAL EXPERIENCE</span>
</div>
</div>
</main>
<!-- Bottom Background Scenic Image -->
<div class="fixed bottom-0 left-0 w-full h-[265px] z-0 opacity-80 pointer-events-none">
<img alt="Warm countryside landscape" class="w-full h-full object-cover object-bottom" data-alt="illustrative hand-painted landscape of rolling sun-drenched golden wheat fields under a soft orange sunset sky, storybook art style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4yXFFh4euX7kMr8YcfICNF1-EFqJoeyU6ZOI8AdmPDkDTuCqffjw5Du9TnOufk83HFFTCFioHB64ew_wzKE1DlghygH0svtu8o3WqT1oErBtHIUd9Au3PYma83NGD21o539STSdCpPQlpVXvPEwK8qPv0EMicTwInMxmDYWc-deL78fafCLhin7xKZqyCy0n7fYr_0Bl8U85HOFcUqmxqp0MRcgN_Bg5gXvKwAQzaWUG9znmlbKkIte5Eri03X2XV9hXxp8m5ERY"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<!-- Decorative Corner Element -->
<div class="fixed bottom-12 right-12 z-20">
<div class="relative w-24 h-24 flex items-center justify-center transform rotate-12">
<div class="absolute inset-0 border-4 border-dashed border-tertiary rounded-full opacity-20"></div>
<span class="material-symbols-outlined text-tertiary text-6xl opacity-40" data-icon="nest_eco_leaf">nest_eco_leaf</span>
</div>
</div>
</body></html>
